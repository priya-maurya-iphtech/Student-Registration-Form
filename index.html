<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="background-glow"></div>
    <div class="container">
        <div class="image-side">
            <img src="ChatGPT Image Mar 3, 2026, 10_49_46 AM.png" alt="Register image" class="student-image">
        </div>

        <div class="form-side">
            <div class="form-header">
                <h3>STUDENT REGISTRATION FORM</h3>
            </div>

            <div class="form-grid">

                <div class="form-group">
                    <label>FIRST NAME</label>
                    <input type="text" placeholder="First Name" id="firstName">
                    <span class="error-msg"></span>
                </div>
                <div class="form-group">
                    <label>LAST NAME</label>
                    <input type="text" placeholder="Last Name" id="lastName">
                    <span class="error-msg"></span>
                </div>

                <div class="form-group full-width">
                    <label>EMAIL</label>
                    <input type="email" placeholder="Email Id" id="email">
                    <span class="error-msg"></span>
                </div>
                <div class="form-group full-width">
                    <label>ADHAAR NUMBER</label>
                    <input type="text" placeholder="Adhaar Number" id="aadhaar">
                    <span class="error-msg"></span>
                </div>

                <div class="form-group">
                    <label>PHONE</label>
                    <input type="tel" placeholder="Phone Number" id="phone">
                    <span class="error-msg"></span>
                </div>
                <div class="form-group">
                    <label>STUDENT ID</label>
                    <input type="text" placeholder="College Id" id="studentId">
                    <span class="error-msg"></span>
                </div>

                <div class="form-group">
                    <label>DATE OF BIRTH</label>
                    <input type="date" id="dob">
                    <span class="error-msg"></span>
                </div>
                <div class="form-group">
                    <label>COURSE</label>
                    <select id="course">
                        <option value="" disabled selected>Select</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Business">Business Admin</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Design">Design & Media</option>
                        <option value="Data Science">Data Science</option>
                    </select>
                    <span class="error-msg"></span>
                </div>

                <div class="gender-section">
                    <span class="gender-label">GENDER</span>
                    <div class="gender-options">
                        <div class="radio-option">
                            <input type="radio" name="gender" id="male" value="Male" checked>
                            <label for="male">Male</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" name="gender" id="female" value="Female">
                            <label for="female">Female</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" name="gender" id="other" value="Other">
                            <label for="other">Other</label>
                        </div>
                    </div>
                </div>

                <div class="form-group full-width address-group">
                    <label>STREET</label>
                    <input type="text" placeholder="Street" id="address">
                    <span class="error-msg"></span>
                </div>
                
                <div class="form-group">
                    <label>STATE</label>
                    <select id="state">
                        <option value="">Select State</option>
                    </select>
                    <span class="error-msg"></span>
                </div>
                
                <div class="form-group">
                    <label>DISTRICT</label>
                    <select id="district">
                        <option value="">Select District</option>
                    </select>
                    <span class="error-msg"></span>
                </div>

                <div class="form-group full-width">
                    <label>HOW DID YOU HEAR?</label>
                    <select id="source">
                        <option value="" disabled selected>Select option</option>
                        <option value="Social Media">Social Media</option>
                        <option value="Friend">Friend / referral</option>
                        <option value="Search">Search engine</option>
                        <option value="Email">Email newsletter</option>
                        <option value="Other">Other</option>
                    </select>
                    <span class="error-msg"></span>
                </div>

                <div class="form-group full-width">
                    <label>PASSWORD</label>
                    <div class="password-row">
                        <input type="password" placeholder="Password" id="pass"><span class="error-msg"></span>
                        <input type="password" placeholder="Confirm" id="confirmPass">
                        <span class="error-msg"></span>
                    </div>
                    <span class="password-hint">min 8 characters</span>
                </div>
            </div>
            <button type="submit" class="submit-btn" id="registerBtn">Register Now</button>
        </div>
    </div>
    <script src="index.js">
    </script>
</body>

</html>
